# Model configurations for OpenRouter-accessed models.
# Select a model with --model <name> --model-config config/models.yaml.
#
# extra_params are passed as extra_body to the API call (e.g. reasoning for Qwen3/Nemotron).
# defaults hold per-model sampling params used when inference config sets null values.

# =============================================================================
# DeepSeek V4 — closed-weight frontier model; reasoning trace exposed natively
# Flash = fast/cost tier, Pro = large/quality tier
# =============================================================================

deepseek-flash:
  model_path: "deepseek/deepseek-v4-flash"
  defaults:
    temperature: 1.0
    top_p: 1.0
    max_tokens: 16384

deepseek-pro:
  model_path: "deepseek/deepseek-v4-pro"
  defaults:
    temperature: 1.0
    top_p: 1.0
    max_tokens: 16384

# =============================================================================
# Moonshot AI — Kimi K2 Thinking (reasoning, 1T MoE / 32B active) +
# Kimi K2.6 (free tier, general instruction model)
# =============================================================================

kimi-thinking:
  model_path: "moonshotai/kimi-k2-thinking"
  defaults:
    temperature: 1.0
    top_p: 0.95
    max_tokens: 16384

kimi-k26:
  model_path: "moonshotai/kimi-k2.6"
  defaults:
    temperature: 1.0
    top_p: 0.95
    max_tokens: 16384

# =============================================================================
# Mistral — Medium 3.5 (large) + Small 4 (cost); both support reasoning
# reasoning effort must be set explicitly; small only accepts "high" or "none"
# trace is returned in choice.message.reasoning via OpenRouter normalisation
# =============================================================================

mistral-medium:
  model_path: "mistralai/mistral-medium-3-5"
  extra_params:
    reasoning:
      effort: "high"
  defaults:
    temperature: 0.7
    top_p: 0.95
    max_tokens: 16384

mistral-small:
  model_path: "mistralai/mistral-small-2603"
  extra_params:
    reasoning:
      effort: "high"
  defaults:
    temperature: 0.7
    top_p: 0.95
    max_tokens: 16384

# =============================================================================
# OpenAI — GPT-5.4 (large, general) + o4-mini (cost, reasoning)
# reasoning on o4-mini is internal; token count visible but trace not exposed
# =============================================================================

gpt-54:
  model_path: "openai/gpt-5.4"
  defaults:
    temperature: 1.0
    top_p: 1.0
    max_tokens: 16384

o4-mini:
  model_path: "openai/o4-mini"
  defaults:
    temperature: 1.0
    top_p: 1.0
    max_tokens: 16384

# =============================================================================
# Anthropic — Claude Sonnet 4.6 (large, adaptive thinking) +
# Haiku 4.5 (cost, extended thinking)
# adaptive thinking on Sonnet 4.6 is always on; no extra_params required
# extended thinking on Haiku must be explicitly enabled via extra_params
# =============================================================================

claude-sonnet:
  model_path: "anthropic/claude-sonnet-4.6"
  defaults:
    temperature: 1.0
    top_p: 1.0
    max_tokens: 16384

claude-haiku:
  model_path: "anthropic/claude-haiku-4.5"
  extra_params:
    # max_tokens here is the thinking budget (internal reasoning tokens), not the response length
    reasoning:
      enabled: true
      max_tokens: 8192
  defaults:
    temperature: 1.0
    top_p: 1.0
    max_tokens: 16384

# =============================================================================
# Google — Gemini 3.5 Flash (cost, thinking on by default) +
# Gemma 4 31B IT (open-weight, instruction-tuned, no reasoning trace)
# =============================================================================

gemini-flash:
  model_path: "google/gemini-3.5-flash"
  defaults:
    temperature: 1.0
    top_p: 0.95
    max_tokens: 16384

gemma-31b:
  model_path: "google/gemma-4-31b-it"
  defaults:
    temperature: 1.0
    top_p: 0.95
    max_tokens: 16384

# =============================================================================
# Qwen (Alibaba) — Qwen3.7 Max (large MoE) + Qwen3.6 27B (cost, dense)
# thinking must be enabled explicitly via the unified OpenRouter reasoning param
# =============================================================================

qwen37-max:
  model_path: "qwen/qwen3.7-max"
  extra_params:
    reasoning:
      enabled: true
  defaults:
    temperature: 0.6
    top_p: 0.95
    max_tokens: 16384

qwen3-6-27b:
  model_path: "qwen/qwen3.6-27b"
  extra_params:
    reasoning:
      enabled: true
  defaults:
    temperature: 0.6
    top_p: 0.95
    max_tokens: 16384

# =============================================================================
# NVIDIA — Nemotron 3 Ultra (550B MoE / 55B active) +
# Nano (30B MoE / 3B active); both free tier, reasoning trace exposed
# reasoning must be enabled explicitly via the unified OpenRouter reasoning param
# =============================================================================

nemotron-ultra:
  model_path: "nvidia/nemotron-3-ultra-550b-a55b"
  extra_params:
    reasoning:
      enabled: true
  defaults:
    temperature: 1.0
    top_p: 0.95
    max_tokens: 16384

nemotron-nano:
  model_path: "nvidia/nemotron-3-nano-30b-a3b"
  extra_params:
    reasoning:
      enabled: true
  defaults:
    temperature: 1.0
    top_p: 0.95
    max_tokens: 16384
