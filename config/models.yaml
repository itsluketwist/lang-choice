# Model configurations for direct provider API access via llm_cgr.
# Select a model with --model <name> --model-config config/models.yaml.
#
# provider maps to a key in llm_cgr's PROVIDER_MAP (e.g. "anthropic", "deepseek").
# model_path is the native API model identifier for that provider.
# enable_reasoning: true captures the chain-of-thought trace where supported.
# defaults hold per-model sampling params used when inference config sets null values.

# =============================================================================
# DeepSeek V4 — closed-weight frontier model; reasoning trace exposed natively
# Flash = fast/cost tier, Pro = large/quality tier
# =============================================================================

deepseek-flash:
  provider: "deepseek"
  model_path: "deepseek-chat"
  enable_reasoning: true
  defaults:
    temperature: 1.0
    top_p: 1.0
    max_tokens: 16384

deepseek-pro:
  provider: "deepseek"
  model_path: "deepseek-chat"
  enable_reasoning: true
  defaults:
    temperature: 1.0
    top_p: 1.0
    max_tokens: 16384

# =============================================================================
# Moonshot AI — Kimi K2 Thinking (reasoning, 1T MoE / 32B active) +
# Kimi K2.6 (free tier, general instruction model)
# =============================================================================

kimi-thinking:
  provider: "moonshot"
  model_path: "kimi-k2-thinking"
  enable_reasoning: true
  defaults:
    temperature: 1.0
    top_p: 0.95
    max_tokens: 16384

kimi-k26:
  provider: "moonshot"
  model_path: "kimi-k2.6"
  defaults:
