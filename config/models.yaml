# Model configurations for direct provider API access via llm_cgr.
# Select a model with --model <name> --model-config config/models.yaml.
#
# provider maps to a key in llm_cgr's PROVIDER_MAP (e.g. "anthropic", "deepseek").
# model_path is the native API model identifier for that provider.
# enable_reasoning: true captures the chain-of-thought trace where supported.
# defaults hold per-model sampling params used when inference config sets null values.

# =============================================================================
# DeepSeek V4 — closed-weight frontier model; reasoning trace exposed natively
# Flash = fast/cost tier, Pro = large/quality tier
# =============================================================================

deepseek-flash:
  provider: "deepseek"
  model_path: "deepseek-v4-flash"
  enable_reasoning: true
  defaults:
    temperature: 1.0
    top_p: 1.0
    max_tokens: 8192

deepseek-pro:
  provider: "deepseek"
  model_path: "deepseek-v4-pro"
  enable_reasoning: true
  defaults:
    temperature: 1.0
    top_p: 1.0
    max_tokens: 8192

# =============================================================================
# Mistral — Medium 3.5 (large) + Small 4 (cost); both support reasoning
# =============================================================================

mistral-medium:
  provider: "mistral"
  model_path: "mistral-medium-3-5"
  enable_reasoning: true
  defaults:
    temperature: 0.7
    top_p: 0.95
    max_tokens: 8192

mistral-small:
  provider: "mistral"
  model_path: "mistral-small-2603"
  enable_reasoning: true
  defaults:
    temperature: 0.7
    top_p: 0.95
    max_tokens: 8192

# =============================================================================
# OpenAI — GPT-5.4 (large, general) + o4-mini (cost, reasoning)
# reasoning on o4-mini is internal; trace not exposed via API
# =============================================================================

gpt-5-4-mini:
  provider: "openai"
  model_path: "gpt-5.4-mini"
  defaults:
    temperature: 1.0
    top_p: 1.0
    max_tokens: 8192

gpt-5-4:
  provider: "openai"
  model_path: "gpt-5.4"
  defaults:
    temperature: 1.0
    top_p: 1.0
    max_tokens: 8192

# =============================================================================
# Anthropic — Claude Sonnet 4.6 (large, adaptive thinking) +
# Haiku 4.5 (cost, extended thinking)
# =============================================================================

claude-sonnet:
  provider: "anthropic"
  model_path: "claude-sonnet-4-6"
  enable_reasoning: true
  defaults:
    temperature: 1.0
    top_p: 1.0
    max_tokens: 8192

claude-haiku:
  provider: "anthropic"
  model_path: "claude-haiku-4-5-20251001"
  enable_reasoning: true
  defaults:
    temperature: 1.0
    top_p: 1.0
    max_tokens: 8192

# =============================================================================
# NVIDIA — Nemotron 3 Ultra (550B MoE / 55B active) +
# Nano (30B MoE / 3B active); both expose reasoning trace
# =============================================================================

nemotron-ultra:
  provider: "together"
  model_path: "nvidia/nemotron-3-ultra-550b-a55b"
  enable_reasoning: true
  defaults:
    temperature: 1.0
    top_p: 0.95
    max_tokens: 8192

# =============================================================================
# Moonshot AI — Kimi K2 Thinking (reasoning, 1T MoE / 32B active) +
# Kimi K2.6 (free tier, general instruction model)
# =============================================================================

kimi-k26:
  provider: "together"
  model_path: "moonshotai/Kimi-K2.6"
  enable_reasoning: true
  defaults:
    temperature: 1.0
    top_p: 0.95
    max_tokens: 8192

# =============================================================================
# Qwen (Alibaba) — Qwen3.7 Max (large MoE) + Qwen3.6 27B (cost, dense)
# =============================================================================

qwen3-235b:
  provider: "together"
  model_path: "Qwen/Qwen3-235B-A22B-Instruct-2507-tput"
  enable_reasoning: false
  defaults:
    temperature: 0.6
    top_p: 0.95
    max_tokens: 8192

qwen3-32b:
  provider: "huggingface"
  model_path: "Qwen/Qwen3-32B"
  enable_reasoning: true
  defaults:
    temperature: 0.6
    top_p: 0.95
    max_tokens: 8192


# ==============================================================================
# Olmo - 32B dense, open-weight model from AllenAI; reasoning trace exposed natively
# ==============================================================================
olmo-32b:
  provider: "huggingface"
  model_path: "allenai/Olmo-3.1-32B-Think"
  enable_reasoning: true
  defaults:
    temperature: 0.6
    top_p: 0.95
    max_tokens: 8192
